<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    h1 {
      text-align: center;
    }

    table {
      width: 800px;
      margin: 0 auto;
    }

    table,
    tr,
    th,
    td {
      border: 1px solid black;
      border-collapse: collapse;
      text-align: center;
    }
  </style>
</head>

<body>
  <h1>订单付款确认页面</h1>
  <script>
    let price = +prompt('请输入商品价格');
    let count = +prompt('请输入商品数量');
    let address = prompt('请输入收货地址');
    let total = price * count;
    document.write(`
      <table>
        <tr>
          <th>商品名称</th>
          <th>商品价格</th>
          <th>商品数量</th>
          <th>总价</th>
          <th>收货地址</th>
        </tr>
        <tr>
          <td>苹果手机17Pro</td>
          <td>${price}元</td>
          <td>${count}</td>
          <td>${total}元</td>
          <td>${address}</td>
        </tr>
      </table>
    `);
  </script>
</body>

</html>

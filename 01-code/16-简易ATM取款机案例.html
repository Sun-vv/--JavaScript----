<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    //  1.输入业务
    let str = prompt(' 请选择你的业务：\n1.取款\n2.存款\n3.转账\n4.查询余额');
    // 2.判断业务
    switch (str) {
      case '1':
        alert('正在为您办理取款业务');
        break;
      case '2':
        alert('正在为您办理存款业务');
        break;
      case '3':
        alert('正在为您办理转账业务');
        break;
      case '4':
        alert('正在为您办理查询余额业务');
        break;
      default:
        alert('输入有误，请重新输入');
    }
    // 3.输出结果
    document.write('您选择的业务是：' + str);
  </script>

</body>

</html>

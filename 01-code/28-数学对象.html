<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    console.log(Math.ceil(1.6)); //2 向上取整
    //Math.floor() 向下取整
    //Math.round() 四舍五入
    //Math.random() 生成0-1之间的随机数[0,1)
    //Math.random()*11 生成0-10之间的随机数
    //Math.max() 返回最大值
    //Math.min() 返回最小值

    let arr = ['赵云', '关羽', '张飞', '刘备', '诸葛亮'];
    let random = Math.floor(Math.random() * arr.length);
    console.log(arr[random]);
    arr.slice(random, 1); //删除随机索引位置的元素
    console.log(arr);
  </script>
</body>

</html>

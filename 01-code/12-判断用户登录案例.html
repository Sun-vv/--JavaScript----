<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    // 1.输入信息。
    let username = prompt('请输入用户名');
    let password = prompt('请输入密码');
    // 2.后台判断
    if (username === '薇薇' && password === '123456') {
      alert('登录成功');
      document.write(`
      <h1>登录结果</h1>
      <p>用户名：${username}</p>
      <p>密码：${password}</p>
    `);
    } else {
      alert('登录失败');
    }
    // 3.输出结果

  </script>


</body>

</html>

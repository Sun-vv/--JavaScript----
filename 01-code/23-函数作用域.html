<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  //限定名字的适用范围：作用域 减少名字冲突
  //函数的作用域：全局 局部
  //全局作用域:可以在整个代码中(script,js文件中)访问和使用。
  //局部作用域：在函数内部定义的变量和函数只能在函数内部访问和使用。

  <script>
    //写max(a,b,c)函数，返回三个数中的最大值
    function max(a, b, c) {
      if (a > b && a > c) {
        return a;
      } else if (b > a && b > c) {
        return b;
      } else {
        return c;
      }
    }
    console.log(max(1, 2, 3));

    //递归实现factorial(n)函数，返回n的阶乘
    function factorial(n) {
      if (n === 0) {
        return 1;
      } else {
        return n * factorial(n - 1);
      }
    }
    console.log(factorial(5));

  </script>
</body>

</html>

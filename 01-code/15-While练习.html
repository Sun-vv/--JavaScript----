<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    // 1.输出1-100
    let i = 1
    let sum = 0
    while (i <= 100) {
      console.log(i)
      sum += i
      i++
    }
    console.log(sum)
    // 2.求出1-100的和
    // 3.计算1-100的偶数和
    let j = 1
    let evenSum = 0
    while (j <= 100) {
      if (j % 2 === 0) {
        evenSum += j
      }
      j++
    }
    console.log(evenSum)

  </script>
</body>

</html>

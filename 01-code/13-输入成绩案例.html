<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    let score = prompt("请输入成绩：")
    if (score >= 90) {
      alert("成绩优秀")
    } else if (score >= 80 && score < 90) {
      alert("成绩良好")
    } else if (score >= 60 && score < 80) {
      alert("成绩及格")
    } else {
      alert("成绩不及格")
    }
  </script>
</body>

</html>

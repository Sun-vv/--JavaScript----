<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    // 声明变量 堆存储数组，arr指向堆内存地址，
    // arr指向的内存地址存储了数组的内容
    // 数组和对象使用const声明，不能修改变量的指向，但可以修改内容
    const arr = [1, 2, 3];
    arr.push(4);
    console.log(arr);
  </script>
</body>

</html>

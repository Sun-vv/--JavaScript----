<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <div></div>
  <script>
    //修改属性（如：颜色，背景色 src 样式）
    //对象.属性名 = 值

    //修改元素的样式属性：style.属性名 = 值
    //如：box.style.color = 'red';
    //如：box.style.backgroundColor = 'yellow';
    //多组单词小驼峰

    //1.获取元素
    const div = document.querySelector('div');
    //2.修改元素的样式所有属性
    div.className = 'box';
    //此时div变成<div class="box"></div>
    //也可以同时有两个名字

    //作用：比较简洁

  </script>
</body>

</html>

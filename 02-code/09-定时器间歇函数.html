<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    //使用场景：京东首页的轮播图，自动切换图片，
    //定时器关闭：鼠标经过轮播图，关闭定时器，鼠标离开轮播图，开启定时器

    //1.开启定时器
    // setInterval(function(){},1000)
    // setInterval(函数{},间隔时间)

    // setInterval(function(){
    //   console.log('一秒执行一次')
    // },1000)

    function fn() {
      console.log('一秒执行一次')
    }
    //setInterval(函数,间隔时间) 函数名不添加括号
    setInterval(fn, 1000) //ms
    //关闭定时器
    //clearInterval(定时器id)
    //clearInterval(setInterval(fn,1000))  //错误写法，无法关闭定时器
    var timerId = setInterval(fn, 1000) //正确写法，返回一个定时器id
    clearInterval(timerId) //通过定时器id关闭定时器
  </script>
</body>

</html>
